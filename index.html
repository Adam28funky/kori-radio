<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kori The Pom Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://hosted.muses.org/mrp.js"></script>

<style>
  body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  .label {
    margin-top: 15px;
    font-size: 1.1rem;
    color: #bbb;
  }

  .copy-box {
    margin-top: 5px;
    font-size: 1rem;
    color: #ccc;
    word-break: break-all;
    cursor: pointer;
    padding: 8px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    display: inline-block;
  }

  .copy-box:active {
    background: #222;
  }

  .player-container {
    margin-top: 20px;
  }

  .hero {
    width: 100%;
    max-width: 900px;
    margin: 20px auto 0 auto;
  }

  .hero img {
    width: 100%;
    border-radius: 12px;
  }
</style>
</head>

<body>

<h1>Kori The Pom Radio</h1>

<!-- Contract Address Label -->
<div class="label">Contract Address</div>

<!-- Tap-to-copy address -->
<div class="copy-box" id="copyAddress">
  HtTYHz1Kf3rrQo6AqDLmss7gq5WrkWAaXn3tupUZbonk
</div>

<!-- Play button directly underneath -->
<div class="player-container">
  <div id="player"></div>

  <!-- Fallback HTML5 audio player -->
  <audio id="fallbackAudio" controls autoplay style="margin-top: 10px;">
    <source src="https://stream1.funky.sx:8433/kori" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</div>

<!-- Image below everything -->
<div class="hero">
  <img src="https://i.ibb.co/0jr799Zx/Screenshot-20260303-092358-Gallery.jpg" alt="Kori Studio">
</div>

<script>
// Muses player
MRP.insert({
  url: "https://stream1.funky.sx:8433/kori",
  codec: "mp3",
  autoplay: true,
  width: 300,
  height: 60,
  skin: "mcclean",
  title: "Kori The Pom Radio"
});

// Tap-to-copy
document.getElementById("copyAddress").addEventListener("click", () => {
  navigator.clipboard.writeText("HtTYHz1Kf3rrQo6AqDLmss7gq5WrkWAaXn3tupUZbonk");
  alert("Contract Address copied");
});

// Autoplay fallback
document.addEventListener("click", () => {
  const audio = document.getElementById("fallbackAudio");
  if (audio.paused) audio.play();
});
</script>

</body>
</html>
